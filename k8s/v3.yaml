apiVersion: apps/v1
kind: Deployment
metadata:
  name: lms-v3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lms-v3
  template:
    metadata:
      labels:
        app: lms-v3
    spec:
      containers:
      - name: lms-v3
        image: lms:v3
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: lms-v3-service
spec:
  type: NodePort
  selector:
    app: lms-v3
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30003