apiVersion: apps/v1
kind: Deployment
metadata:
  name: lms-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lms-v2
  template:
    metadata:
      labels:
        app: lms-v2
    spec:
      containers:
      - name: lms-v2
        image: kavyathatavarthi/lms:v2
        imagePullPolicy: Always
        ports:
        - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: lms-v2-service
spec:
  type: NodePort
  selector:
    app: lms-v2
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30002